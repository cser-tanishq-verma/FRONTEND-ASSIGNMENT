<form (ngSubmit)="handleSubmit()" class="user-form">
  <fieldset>
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" [(ngModel)]="userdata.name" required>
    </div>
    <div class="form-group">
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" [(ngModel)]="userdata.age" required>
    </div>
    <div class="form-group">
      <label for="image">Image URL:</label>
      <input type="text" id="image" name="image" [(ngModel)]="userdata.image" required>
    </div>
    <button type="submit" class="submit-btn">Add User</button>
  </fieldset>
</form>
