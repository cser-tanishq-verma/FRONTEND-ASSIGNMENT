<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div style="
  display:flex;
  justify-content: space-evenly;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 10px;
  border:2px solid black;
  height:200px;
">

  <div style="background:red; padding:10px; font-size:12px;">Small</div>
  <div style="background:blue; padding:20px; font-size:20px;">Medium</div>
  <div style="background:green; padding:30px; font-size:30px;">Large</div>
  <div style="background:orange; padding:15px; font-size:18px;">Text</div>
  <div style="background:purple; padding:25px; font-size:25px;">Flex</div>
  <div style="background:pink; padding:10px; font-size:14px;">Box</div>

</div>

<div style="
  display:flex;
  width:200px;
  border:2px solid black;
  flex-wrap: wrap;
  align-items: baseline;
  gap:10px;
">

  <div style="background:red; font-size:12px; padding:10px;">
    Small
  </div>

  <div style="background:blue; font-size:25px; padding:20px;">
    Big
  </div>

  <div style="background:green; font-size:16px; padding:15px;">
    Medium
  </div>

</div>
<div style="
  display:flex;
  width:150px;
  flex-wrap: wrap;
  border:2px solid black;
  gap:10px;
">

  <div style="background:red; width:80px;">1</div>
  <div style="background:blue; width:80px;">2</div>
  <div style="background:green; width:80px;">3</div>

</div>

<div style="
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  border:2px solid black;
">

  <div style="background:red;">1</div>
  <div style="background:blue;">2</div>
  <div style="background:green;">3</div>

</div>

</body>
</html>
