<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div p{
        background-color: aqua;
    }
    div>p{
        background-color: red;
    }
    h1~p{
        background-color: blue;
    }
    h1+p{
        background-color: green;
    }
</style>
<body style="background-color: pink;">
    <div>
        <p>para1</p>
        <p>para2</p>
        <section>
            <p>para3</p>
        </section>
        <h1>hello</h1>
        <p>para4</p>
        <p>para5</p>
    </div>

    <h1 style="margin: 10px 20px 30px 40px;">hello world</h1>
    <h1 style="margin: 10px 20px 30px;">hello world</h1>
    <h1 style="margin: 10px 20px;">hello world</h1>
    <h1 style="margin: 10px;">hello world</h1>
    <h1 style="border: solid; padding: 10px 20px 30px 20px;">hello world</h1>
    <h1 style="border:double; padding: 20px 40px 60px;">hello world</h1>
</body>
</html>
