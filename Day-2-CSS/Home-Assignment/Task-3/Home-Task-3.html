<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators & Pseudo Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }

        .header {
            display: flex;
            margin-bottom: 40px;
            width: fit-content;
        }

        .header-part1 {
            background-color: #1dd7df;
            padding: 15px 25px;
            font-size: 36px;
            font-weight: bold;
            color: black;
        }

        .header-separator {
            background-color: red;
            padding: 15px 10px;
            font-size: 36px;
            font-weight: bold;
            color: white;
        }

        .header-part2 {
            background-color: #d61e95;
            padding: 15px 25px;
            font-size: 36px;
            font-weight: bold;
            color: white;
        }

        ul {
            list-style-type: disc;
            margin-left: 20px;
        }

        li {
            color: #d81b60;
            font-size: 18px;
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
        }

        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 180px;
            background-color: #333;
            color: white;
            text-align: center;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -90px;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            font-size: 14px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-part1">Combinators</div>
        <div class="header-separator">&</div>
        <div class="header-part2">Pseudo Tasks</div>
    </div>

    <ul>
        <li>
            <span class="tooltip">
                Item 1
                <span class="tooltiptext">This is Item 1 tooltip</span>
            </span>
        </li>
        <li>
            <span class="tooltip">
                Item 2
                <span class="tooltiptext">This is Item 2 tooltip</span>
            </span>
        </li>
        <li>
            <span class="tooltip">
                Item 3
                <span class="tooltiptext">This is Item 3 tooltip</span>
            </span>
        </li>
        <li>
            <span class="tooltip">
                Item 4
                <span class="tooltiptext">This is Item 4 tooltip</span>
            </span>
        </li>
        <li>
            <span class="tooltip">
                Item 5
                <span class="tooltiptext">This is Item 5 tooltip</span>
            </span>
        </li>
        <li>
            <span class="tooltip">
                Item 6
                <span class="tooltiptext">This is Item 6 tooltip</span>
            </span>
        </li>
    </ul>
</body>
</html>
